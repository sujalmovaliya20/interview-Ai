services:
  redis:
    image: redis:7-alpine
    # No host port exposed — services connect via Docker network (redis://redis:6379)
    # To debug locally: uncomment the next line (use 6380 to avoid conflicts)
    # ports: ["6380:6379"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file: ./server/.env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  transcription:
    build:
      context: ./services/transcription
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: ./services/transcription/.env
    environment:
      - ENVIRONMENT=production
      - PORT=8000
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
