version: '3.9'
services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]
    healthcheck: { test: ["CMD","redis-cli","ping"], interval: 5s, timeout: 3s, retries: 5 }
  
  server:
    build: { context: ./server, dockerfile: Dockerfile }
    ports: ["3001:3001"]
    env_file: ./server/.env
    depends_on:
      redis:
        condition: service_healthy
    volumes: ["./server/src:/app/src"]

volumes:
  redis_data:
